<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="apple-touch-icon" href="appicone.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recibos">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Recibos — Rosendo Casas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#222636;--border:rgba(255,255,255,.08);
  --green:#22C55E;--green-dim:rgba(34,197,94,.15);--red:#EF4444;--red-dim:rgba(239,68,68,.12);
  --gold:#F59E0B;--text:#F1F5F9;--muted:#64748B;--muted2:#94A3B8;
  --radius:16px;--font:'Space Grotesk',sans-serif
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}
header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:16px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400}
.hdr-right{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
.icon-btn:active{background:var(--surface2)}
main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.tabs{display:flex;gap:6px;background:var(--surface);border-radius:12px;padding:4px}
.tab-btn{flex:1;height:38px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.tab-panel{display:none;flex-direction:column;gap:14px}
.tab-panel.active{display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
.camera-zone{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.camera-zone.has-image{border-style:solid;border-color:var(--green)}
.camera-zone:active{background:var(--surface2)}
#preview-img{width:100%;height:190px;object-fit:cover;border-radius:calc(var(--radius) - 2px);display:none}
.camera-zone.has-image #preview-img{display:block}
.camera-zone.has-image .cam-ph{display:none}
.cam-ph{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.cam-icon{width:52px;height:52px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px}
.cam-title{font-size:14px;font-weight:600}
.cam-sub{font-size:12px;color:var(--muted);text-align:center;padding:0 20px}
#file-input{display:none}
.change-photo{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--font);font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;display:none}
.camera-zone.has-image .change-photo{display:block}
.ai-btn{width:100%;height:54px;background:var(--green);color:#0a1a0f;border:none;border-radius:var(--radius);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s}
.ai-btn:disabled{opacity:.35;cursor:not-allowed}
.ai-btn:not(:disabled):active{transform:scale(.98);opacity:.9}
.spinner{width:20px;height:20px;border:2.5px solid rgba(10,26,15,.3);border-top-color:#0a1a0f;border-radius:50%;animation:spin .7s linear infinite;display:none}
.ai-btn.loading .btn-txt{display:none}
.ai-btn.loading .spinner{display:block}
.erro-box{background:var(--red-dim);border:1px solid var(--red);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5;display:none}
.erro-box.visible{display:block}
.erro-box strong{color:var(--red);display:block;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.result-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:none;animation:slideUp .3s ease}
.result-card.visible{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.card-title{font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;margin-left:8px}
.edit-hint{font-size:11px;color:var(--muted)}
.fields{padding:2px 0}
.frow{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);gap:10px}
.frow:last-child{border-bottom:none}
.flabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;width:88px;flex-shrink:0}
.fval{flex:1;font-size:14px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;font-family:var(--font);padding:3px 7px;border-radius:6px;transition:background .15s}
.fval:focus{background:var(--surface2)}
select.fval{cursor:pointer;appearance:none;-webkit-appearance:none}
.fval.c-entrada{color:var(--green)}
.fval.c-saida{color:var(--red)}
.tipo-wrap{flex:1;display:flex;gap:8px}
.tbtn{flex:1;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.tbtn.a-saida{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.tbtn.a-entrada{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.confirm-btn{width:100%;height:54px;background:var(--surface2);border:1px solid var(--green);color:var(--green);border-radius:var(--radius);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s;position:relative;z-index:100}
.confirm-btn.visible{display:flex}
.confirm-btn:active{transform:scale(.98)}
.confirm-btn.sending{opacity:.6;pointer-events:none}
.manual-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.manual-header{padding:13px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase}
.submit-btn{width:100%;height:54px;background:var(--green);color:#0a1a0f;border:none;border-radius:var(--radius);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s}
.submit-btn:active{transform:scale(.98);opacity:.9}
.submit-btn.sending{opacity:.6;pointer-events:none}
.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(90px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:30px;font-size:13px;font-weight:500;white-space:nowrap;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)}
.toast.err{border-color:var(--red)}
.overlay{position:fixed;inset:0;z-index:200;display:none;flex-direction:column}
.overlay.open{display:flex}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px calc(24px + env(safe-area-inset-bottom,0));animation:sheetUp .3s ease;max-width:480px;margin:0 auto}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:18px}
.s-field{margin-bottom:14px}
.s-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.s-input{width:100%;height:46px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:var(--font);font-size:13px;padding:0 15px;outline:none;transition:border-color .15s}
.s-input:focus{border-color:var(--green)}
.s-notice{font-size:12px;color:var(--gold);text-align:center;min-height:18px;margin-bottom:4px}
.save-btn{width:100%;height:46px;background:var(--green);border:none;border-radius:11px;color:#0a1a0f;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.hist-section{margin-top:2px}
.hist-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hdot.s{background:var(--red)}
.hdot.e{background:var(--green)}
.hinfo{flex:1;min-width:0}
.hdesc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hmeta{font-size:11px;color:var(--muted);margin-top:2px}
.hval{font-size:13px;font-weight:700;flex-shrink:0}
.hval.s{color:var(--red)}
.hval.e{color:var(--green)}
.forn-frow{position:static}
.forn-wrap{position:relative;flex:1;min-width:0}
.forn-wrap input{width:100%;background:transparent;border:none;outline:none;font-family:var(--font);font-size:14px;font-weight:500;color:var(--text);cursor:pointer}
.forn-clear{position:absolute;right:2px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px;line-height:1;display:none;z-index:2}
.forn-wrap.has-value .forn-clear{display:block}
.forn-badge{display:inline-block;background:var(--green-dim);color:var(--green);border-radius:6px;font-size:10px;padding:1px 6px;margin-left:4px;font-weight:700;vertical-align:middle}
.forn-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8000;display:none;backdrop-filter:blur(3px)}
.forn-ov.open{display:block}
.forn-bs{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#1c1c1e;border-radius:22px 22px 0 0;z-index:8001;display:flex;flex-direction:column;max-height:75vh;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);will-change:transform}
.forn-bs.open{transform:translateY(0)}
.forn-bs-top{padding:10px 20px 0;flex-shrink:0}
.forn-bs-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px}
.forn-bs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.forn-bs-title{font-size:16px;font-weight:700;color:var(--text)}
.forn-bs-close{background:var(--surface2);border:none;color:var(--muted);font-size:16px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1}
.forn-bs-search{position:relative;margin-bottom:6px}
.forn-bs-search input{width:100%;height:44px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:15px;padding:0 40px 0 16px;outline:none;transition:border-color .15s;box-sizing:border-box}
.forn-bs-search input:focus{border-color:var(--green)}
.forn-bs-search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;line-height:1;display:none}
.forn-bs-search-clear.vis{display:block}
.forn-bs-list{overflow-y:auto;flex:1;padding-bottom:env(safe-area-inset-bottom,16px)}
.forn-bs-opt{padding:15px 20px;font-size:15px;font-weight:500;color:var(--text);border-bottom:1px solid var(--border);cursor:pointer}
.forn-bs-opt:last-child{border-bottom:none}
.forn-bs-opt:active{background:rgba(74,222,128,.1);color:var(--green)}
.forn-bs-opt.add-new{color:var(--green);font-weight:700;font-size:14px}
.forn-bs-opt.add-new::before{content:"＋  "}
.forn-bs-empty{padding:20px;text-align:center;color:var(--muted);font-size:14px}
.itens-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.itens-title{font-size:13px;font-weight:600;color:var(--muted2)}
.itens-total{font-size:13px;font-weight:700;color:var(--green)}
.item-card{border:1px solid var(--border);border-radius:12px;margin:10px 16px;overflow:hidden;background:var(--surface2)}
.item-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);cursor:pointer;user-select:none}
.item-num{font-size:12px;font-weight:700;color:var(--muted);background:var(--surface2);border-radius:6px;padding:2px 8px}
.item-valor-badge{font-size:14px;font-weight:700;color:var(--red)}
.item-valor-badge.entrada{color:var(--green)}
.item-remove{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1}
.item-body{padding:4px 0 8px}
.item-body .frow{padding:8px 14px}
.add-item-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 16px;padding:11px;border:1.5px dashed var(--border);border-radius:12px;background:none;color:var(--muted2);font-size:13px;font-weight:600;cursor:pointer;width:calc(100% - 32px);transition:all .2s}
.add-item-btn:hover{border-color:var(--green);color:var(--green)}
.itens-warn{font-size:12px;color:var(--gold);padding:6px 18px;display:none}
.itens-warn.visible{display:block}
.confirm-multi{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:14px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;width:calc(100% - 32px);margin:8px 16px 16px;font-family:var(--font)}
#debugPanel{position:fixed;bottom:0;left:0;right:0;max-height:45vh;background:#0a0a0a;border-top:2px solid #4ade80;z-index:9999;display:none;flex-direction:column;font-family:monospace}
#debugPanel.open{display:flex}
#debugHeader{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#111;flex-shrink:0}
#debugHeader span{color:#4ade80;font-size:12px;font-weight:700}
#debugHeader button{background:none;border:none;color:#aaa;font-size:16px;cursor:pointer}
#debugLog{overflow-y:auto;padding:8px 12px;flex:1;font-size:11px;line-height:1.6}
#debugLog .d-ok{color:#4ade80}
#debugLog .d-err{color:#f87171}
#debugLog .d-warn{color:#fbbf24}
#debugLog .d-info{color:#94a3b8}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#0f1f17 0%,#152b1e 60%,#0a1a10 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease;">
  <img src="appicone.png" width="110" height="110" style="border-radius:26px;box-shadow:0 8px 40px rgba(74,222,128,0.25);margin-bottom:22px;" onerror="this.style.display='none'">
  <div style="color:#fff;font-size:26px;font-weight:700;letter-spacing:-0.5px;">Recibos</div>
  <div style="color:#4ade80;font-size:14px;font-weight:500;margin-top:6px;letter-spacing:0.5px;">Casas Rosendo</div>
  <div style="margin-top:48px;width:36px;height:3px;background:rgba(74,222,128,0.25);border-radius:2px;overflow:hidden;">
    <div id="splash-bar" style="height:100%;width:0%;background:#4ade80;border-radius:2px;transition:width 1.6s ease;"></div>
  </div>
</div>
<script>
(function(){
  var _done=false;
  function hide(){if(_done)return;_done=true;var s=document.getElementById('splash');if(!s)return;var b=document.getElementById('splash-bar');if(b)b.style.width='100%';setTimeout(function(){s.style.opacity='0';setTimeout(function(){s.style.display='none';},600);},1600);}
  setTimeout(hide,2000);
  window.addEventListener('load',function(){setTimeout(hide,200);});
})();
</script>

<div class="app">
<header>
  <div class="logo">
    <div class="logo-icon">🧾</div>
    <div>
      <div class="logo-text">Recibos</div>
      <div class="logo-sub">Rosendo Casas <span style="font-size:9px;opacity:.4">v3.22</span></div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="icon-btn" onclick="document.getElementById('debugPanel').classList.toggle('open')" title="Debug">🔍</div>
    <div class="icon-btn" onclick="location.reload()" title="Atualizar">🔄</div>
    <div class="icon-btn" onclick="abrirSettings()" title="Configurações">⚙️</div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-foto-btn" onclick="mudarTab('foto')">📷 Foto + IA</button>
    <button class="tab-btn" id="tab-manual-btn" onclick="mudarTab('manual')">✏️ Manual</button>
  </div>

  <!-- TAB FOTO -->
  <div class="tab-panel active" id="tab-foto">
    <div class="camera-zone" id="cameraZone">
      <img id="preview-img" alt="preview">
      <div class="cam-ph">
        <div class="cam-icon">🧾</div>
        <div class="cam-title">Adicionar recibo</div>
        <div class="cam-sub">Toque para câmera ou galeria</div>
      </div>
      <button class="change-photo" id="changePh">Trocar foto</button>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="fotoSelecionada(event)" style="display:none">
    <button class="ai-btn" id="aiBtn" disabled onclick="analisarIA()" style="display:none">
      <span class="btn-txt">✨ Analisar com IA</span>
      <div class="spinner"></div>
    </button>
    <div class="erro-box" id="erroBox">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div><strong>⚠️ Erro da IA</strong> <span id="erroMsg"></span></div>
        <button id="retryBtn" onclick="analisarIA()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--font);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0">🔄 Tentar novamente</button>
      </div>
    </div>
    <div class="result-card" id="resultCard">
      <div class="card-header">
        <div style="display:flex;align-items:center">
          <div class="card-dot"></div>
          <span class="card-title" id="resultTitle">Dados extraídos</span>
        </div>
        <span class="edit-hint">toque para editar</span>
      </div>
      <div id="single-item-view"><div class="fields" id="fields-foto"></div></div>
      <div id="multi-item-view" style="display:none">
        <div class="itens-header">
          <span class="itens-title" id="itens-count-label">0 itens</span>
          <span class="itens-total" id="itens-total-label">Total: R$0,00</span>
        </div>
        <div class="itens-warn" id="itens-warn"></div>
        <div id="itens-list"></div>
        <button class="add-item-btn" onclick="adicionarItemVazio()">➕ Adicionar item</button>
      </div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="dbg('🟢 BOTÃO CLICADO - chegou no onclick','ok');lancar('foto')">
      ✅ Confirmar e lançar no Sheets
    </button>
    <button class="confirm-multi" id="confirmMultiBtn" onclick="lancarMulti()" style="display:none">
      ✅ Lançar todos os itens
    </button>
  </div>

  <!-- TAB MANUAL -->
  <div class="tab-panel" id="tab-manual">
    <div class="manual-card">
      <div class="manual-header">✏️ Lançamento manual</div>
      <div class="fields" id="fields-manual"></div>
    </div>
    <button class="submit-btn" id="submitManual" onclick="lancar('manual')">✅ Lançar no Sheets</button>
  </div>

  <div class="hist-section" id="histSection"></div>
</main>

function fotoSelecionada(e){
  const f=e.target.files[0];if(!f)return;

  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=700;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL("image/jpeg",0.45);
      imgB64=dataUrl.split(",")[1];imgMime="image/jpeg";
      document.getElementById("preview-img").src=dataUrl;
      document.getElementById("cameraZone").classList.add("has-image");

      document.getElementById("erroBox").classList.remove("visible");
      analisarIA();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);e.target.value="";
}

// ── IA ─────────────────────────────────────────────────────────
function forcarSaida(){document.getElementById("aiLoading").style.display="none";preencherFoto({},"manual");toast("Preencha manualmente","");}
async function analisarIA(){
  function dbgAI(msg){const p=document.querySelector("#aiLoading .dbg-log");if(p)p.textContent+=msg+"\n";dbg("[IA] "+msg,"info");}
  const cfg_=cfg();
  if(!cfg_.key){toast("⚙️ Configure a chave Gemini primeiro","err");abrirSettings();return;}
  if(!imgB64){toast("📷 Selecione uma foto primeiro","err");return;}
  document.getElementById("erroBox").classList.remove("visible");
  document.getElementById("resultCard").classList.remove("visible");
  document.getElementById("confirmBtn").classList.remove("visible");
  document.getElementById("aiLoading").style.display="flex";
  const safetyTimer=setTimeout(()=>{dbgAI("⚠️ Safety timeout 45s");document.getElementById("aiLoading").style.display="none";mostrarErro("Tempo esgotado. Preencha manualmente.");preencherFoto({},"manual");},45000);
  try{
    const CATS_LIST="Acabamentos/Instalação Elétrica/Instalação Hidráulica/Infraestrutura e Fundação/Estrutura e Alvenaria/Cobertura/Esquadrias/Mão de Obra/Logística e Apoio/Terreno e Legalização/Administração";
    const prompt=`Analise este recibo fiscal/cupom. Retorne APENAS JSON válido, sem markdown, sem texto extra.\n\nREGRAS IMPORTANTES:\n1. Se o recibo tem 2 ou mais produtos/itens DISTINTOS → use modo "multiplo" e liste CADA item separadamente no array "itens"\n2. Se o recibo tem apenas 1 produto ou é uma nota de serviço → use modo "simples" com 1 item\n3. Cada item do array deve ter seu próprio valor unitário (não o total)\n4. A SOMA de todos os valores dos itens deve ser IGUAL ao valorTotal do recibo\n5. Nunca agrupe itens diferentes — prefira separar\n6. Se não conseguir ler o valor de um item específico, divida o total igualmente\n\nFormato JSON obrigatório:\n{"modo":"multiplo","fornecedor":"NOME_LOJA","valorTotal":"0.00","data":"DD/MM/AAAA","itens":[{"descricao":"Nome do produto","quantidade":"1","valor":"0.00","categoria":"Administração","subCategoria":"","tipo":"Saida"}]}\n\nCategorias válidas: ${CATS_LIST}\n\nRetorne SÓ o JSON, sem nenhum texto antes ou depois.`;
    let parsed=null,modeloUsado="",erroMsg="";
    for(const modelo of MODELOS){
      // gemini-2.0-* → v1beta | gemini-1.5-* → v1
      const apiVer = modelo.startsWith("gemini-2") ? "v1beta" : "v1";
      dbgAI("🔄 "+modelo+" ["+apiVer+"]");
      const url=`https://generativelanguage.googleapis.com/${apiVer}/models/${modelo}:generateContent?key=${cfg_.key}`;
      try{
        const ctrl=new AbortController();
        const timer=setTimeout(()=>{dbg("⏱ Abort "+modelo);ctrl.abort();},18000);
        const res=await fetch(url,{method:"POST",signal:ctrl.signal,headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:imgMime,data:imgB64}}]}],generationConfig:{temperature:0.1,maxOutputTokens:1200}})});
        clearTimeout(timer);
        dbgAI("✅ HTTP "+res.status);
        // 429 = quota esgotada → tenta próximo modelo
        if(res.status===429){erroMsg="quota esgotada (429)";dbgAI("⚠️ 429 quota — próximo modelo...");continue;}
        // 404 = modelo não disponível nesta versão de API → tenta próximo
        if(res.status===404){erroMsg="modelo indisponível (404)";dbgAI("⚠️ 404 modelo — próximo...");continue;}
        // 400 = bad request (ex: imagem muito grande) → para o loop
        if(res.status===400){erroMsg="erro de requisição (400) — imagem pode ser inválida";dbgAI("❌ 400 — abortando");break;}
        if(!res.ok){erroMsg=`HTTP ${res.status}`;continue;}
        const json=await res.json();
        if(json.error){erroMsg=json.error.message;dbg("❌ API: "+erroMsg);continue;}
        const texto=(json.candidates?.[0]?.content?.parts?.[0]?.text||"").trim();
        dbgAI("📄 Resposta: "+texto.substring(0,80));
        if(!texto){erroMsg="sem texto";continue;}
        let p=null;
        let txt2=texto.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
        try{p=JSON.parse(txt2);}catch(e){}
        if(!p){const ini=txt2.indexOf("{"),fim=txt2.lastIndexOf("}");if(ini!==-1&&fim>ini)try{p=JSON.parse(txt2.slice(ini,fim+1));}catch(e){}}
        if(!p){const ini=txt2.indexOf("{");if(ini!==-1){let parcial=txt2.slice(ini);parcial=parcial.replace(/,\s*"[^"]*"\s*:\s*"[^"]*$/,"}");parcial=parcial.replace(/,\s*"[^"]*"\s*:\s*$/,"}");const diff=(parcial.match(/{/g)||[]).length-(parcial.match(/}/g)||[]).length;if(diff>0)parcial+="}".repeat(diff);try{p=JSON.parse(parcial);}catch(e){}}}
        if(p){
          if(!p.itens&&p.valor){p={modo:"simples",fornecedor:p.fornecedor||"",valorTotal:p.valor,data:p.data||"",itens:[{descricao:p.descricao||"",quantidade:"1",valor:p.valor,categoria:p.categoria||"Administração",subCategoria:p.subCategoria||"",tipo:p.tipo||"Saida"}]};}
          parsed=p;modeloUsado=modelo;
          dbgAI("✅ JSON OK! modo="+(p.modo||"?")+" itens="+(p.itens?.length||0));break;
        }
        erroMsg="JSON inválido";dbgAI("❌ JSON inválido: "+txt2.substring(0,80));
      }catch(ex){erroMsg=ex.name==="AbortError"?"timeout":ex.message;dbgAI("❌ Catch: "+erroMsg);if(ex.name==="AbortError")break;}
    }
    clearTimeout(safetyTimer);
    document.getElementById("aiLoading").style.display="none";
    if(parsed&&parsed.itens&&parsed.itens.length>0){
      if(parsed.modo==="multiplo"&&parsed.itens.length>1)preencherMulti(parsed,modeloUsado);
      else preencherFoto(parsed.itens[0],modeloUsado,parsed);
    }else{
      // Diagnóstico de erro específico
      let msgFinal = "IA não leu o recibo — preencha manualmente.";
      if(erroMsg.includes("429")||erroMsg.includes("quota")){
        msgFinal = "Quota da IA esgotada (429). Aguarde 1 min e tente novamente, ou preencha manualmente.\n⚙️ Se persistir, troque a chave Gemini nas Configurações.";
      } else if(erroMsg.includes("404")){
        msgFinal = "Modelos Gemini indisponíveis (404). Verifique sua chave API nas ⚙️ Configurações.";
      } else {
        msgFinal = "IA não leu o recibo — preencha manualmente.\nDetalhe: "+erroMsg;
      }
      mostrarErro(msgFinal);
      preencherFoto({},"manual");
    }
  }catch(fatalErr){
    clearTimeout(safetyTimer);document.getElementById("aiLoading").style.display="none";
    mostrarErro("Erro inesperado: "+fatalErr.message);preencherFoto({},"manual");
  }
}

// ══════════════════════════════════════════════════════════════
//  ENVIO — iOS PWA safe (v3.19)
//
//  PROBLEMA RAIZ: iOS Safari standalone bloqueia XHR/fetch POST
//  para script.google.com porque o Apps Script retorna redirect
//  302 → googleusercontent.com. O Safari em modo PWA trata esse
//  redirect como network error (política de segurança standalone).
//
//  SOLUÇÃO:
//  1. Dados textuais → GET com ?action=lancar&... (sem redirect issue)
//  2. Foto → POST no-cors em background após confirmar lançamento
//  3. POST/XHR mantidos como fallback para browser normal
// ══════════════════════════════════════════════════════════════

// Envia dados textuais via GET — funciona 100% no iOS PWA standalone
function _enviarGET(url, payload) {
  return new Promise((resolve, reject) => {
    const p = new URLSearchParams();
    p.set("action", "lancar");
    ["tipo","projeto","valor","qtd","descricao","fornecedor",
     "categoria","subCategoria","data","grupoRecibo"].forEach(k => {
      if (payload[k] !== undefined && payload[k] !== null)
        p.set(k, String(payload[k]));
    });
    const fullUrl = url + "?" + p.toString();
    dbg("📤 GET: " + fullUrl.substring(0, 90), "info");
    const xhr = new XMLHttpRequest();
    xhr.open("GET", fullUrl, true);
    xhr.timeout = 28000;
    xhr.onload = function() {
      const txt = xhr.responseText || "";
      dbg("📥 GET " + xhr.status + " (" + txt.length + "c) → " + txt.substring(0,60), "info");
      if (xhr.status < 200 || xhr.status >= 400) { reject(new Error("GET " + xhr.status)); return; }
      // Detectar resposta padrão do doGet (script antigo sem action=lancar)
      // Ex: {"status":"ok","msg":"Recibos API v8"} → lançamento NÃO foi feito
      const s = txt.indexOf("{");
      if (s !== -1) {
        try {
          const json = JSON.parse(txt.substring(s));
          // Se veio resposta de "lancar" real → tem "ok":true + não tem "status":"ok"
          if (json.status === "ok" && json.msg) {
            // Script antigo ou deploy desatualizado — precisamos usar POST
            reject(new Error("API não processou action=lancar (deploy desatualizado — use POST)"));
            return;
          }
          resolve(json);
          return;
        } catch(e) {}
      }
      // Resposta vazia mas HTTP 200 → aceita como sucesso (sendBeacon-like)
      resolve({ ok: true, _semJson: true });
    };
    xhr.onerror   = () => reject(new Error("GET network error"));
    xhr.ontimeout = () => reject(new Error("GET timeout"));
    xhr.send();
  });
}

// Envia foto via POST (v3.22) — segue redirect do Apps Script
// Estratégia: fetch sem mode:no-cors para receber resposta real com link Drive
// Fallback: no-cors fire-and-forget se fetch normal falhar
async function _enviarFotoPost(url, dados) {
  if (!dados.fotoBase64 || !dados.fotoMime) return null;
  const kb = Math.round(dados.fotoBase64.length * 0.75 / 1024);
  if (kb > 700) { dbg("⚠️ Foto " + kb + "KB — muito grande, skip", "warn"); return null; }
  const payload = {
    action:      "uploadFoto",
    grupoRecibo: dados.grupoRecibo || "",
    fotoBase64:  dados.fotoBase64,
    fotoMime:    dados.fotoMime,
    descricao:   dados.descricao || "",
    projeto:     dados.projeto   || "",
  };
  dbg("📤 Enviando foto (" + kb + "KB) para Drive...", "info");
  try {
    const resp = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
    const txt  = await resp.text().catch(() => "");
    const s = txt.indexOf("{");
    if (s !== -1) {
      try {
        const j = JSON.parse(txt.substring(s));
        if (j.link) { dbg("📎 Foto no Drive: " + j.link, "ok"); return j.link; }
        dbg("⚠️ Drive sem link: " + txt.substring(s, 80), "warn");
      } catch(e) {}
    }
    dbg("📎 Foto enviada (sem link)", "ok");
    return null;
  } catch(e) {
    dbg("⚠️ Foto fetch falhou: " + e.message + " — no-cors fallback", "warn");
    try {
      const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
      await fetch(url, { method: "POST", body: blob, mode: "no-cors" });
      dbg("📎 Foto enviada (no-cors fallback)", "ok");
    } catch(e2) { dbg("❌ Foto falhou: " + e2.message, "warn"); }
    return null;
  }
}

async function lancar(pfx) {
  dbg("🟢 BOTÃO CLICADO — chegou no onclick", "ok");
  dbg("🚀 Iniciando lançamento... pfx=" + pfx, "info");
  const c = cfg();
  if (!c.url) { toast("⚙️ Configure a URL do Apps Script","err"); abrirSettings(); return; }
  const tipo = pfx === "foto" ? tipoFoto : tipoManual;
  dbg("📋 tipo=" + tipo + " | url=" + c.url.substring(0,50) + "...", "info");
  const dados = {
    tipo,
    projeto:      document.getElementById("proj-"+pfx)?.value  || c.projeto,
    valor:        String(parseBRL(document.getElementById("val-"+pfx)?.value || "0")),
    qtd:          document.getElementById("qtd-"+pfx)?.value   || "",
    descricao:    document.getElementById("desc-"+pfx)?.value  || "",
    fornecedor:   document.getElementById("forn-"+pfx)?.value  || "N/A",
    categoria:    document.getElementById("cat-"+pfx)?.value   || "Administração",
    subCategoria: document.getElementById("sub-"+pfx)?.value   || "",
    data:         document.getElementById("data-"+pfx)?.value  || new Date().toLocaleDateString("pt-BR"),
  };
  const val = parseFloat(dados.valor);
  if (!val || val <= 0) { toast("⚠️ Informe um valor válido","err"); return; }
  if (pfx === "foto" && imgB64 && imgMime) {
    const kb = Math.round(imgB64.length * 0.75 / 1024);
    dbg("📷 Foto: " + kb + "KB | mime: " + imgMime, "info");
    dados.fotoBase64  = imgB64;
    dados.fotoMime    = imgMime;
    dados.grupoRecibo = "REC_" + Date.now().toString(36).toUpperCase();
  }
  const btn = pfx === "foto" ? document.getElementById("confirmBtn") : document.getElementById("submitManual");
  btn.classList.add("sending");
  const txtOrig = btn.innerHTML;
  btn.innerHTML = "📤 Enviando...";
  try {
    let respJson = null;
    // ── GET primeiro (iOS PWA safe) ──────────────────────
    try {
      respJson = await _enviarGET(c.url, dados);
      dbg("✅ GET ok", "ok");
      if (dados.fotoBase64) await _enviarFotoPost(c.url, dados);
    } catch(getErr) {
      dbg("⚠️ GET falhou: " + getErr.message + " — POST fallback", "warn");
      try {
        const sem = Object.assign({}, dados);
        delete sem.fotoBase64; delete sem.fotoMime;
        respJson = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open("POST", c.url, true);
          xhr.setRequestHeader("Content-Type","application/json");
          xhr.timeout = 30000;
          xhr.onload = function() {
            const txt = xhr.responseText || "";
            const s = txt.indexOf("{");
            if (s !== -1) { try { resolve(JSON.parse(txt.substring(s))); return; } catch(e) {} }
            if (xhr.status >= 200 && xhr.status < 400) { resolve({ ok: true }); return; }
            reject(new Error("POST " + xhr.status));
          };
          xhr.onerror   = () => reject(new Error("POST network error"));
          xhr.ontimeout = () => reject(new Error("POST timeout"));
          xhr.send(JSON.stringify(sem));
        });
        dbg("✅ POST fallback ok", "ok");
        if (dados.fotoBase64) await _enviarFotoPost(c.url, dados);
      } catch(postErr) {
        dbg("⚠️ POST falhou: " + postErr.message + " — sendBeacon", "warn");
        try {
          const sem = Object.assign({}, dados);
          delete sem.fotoBase64; delete sem.fotoMime;
          const blob = new Blob([JSON.stringify(sem)], { type: "application/json" });
          const ok = navigator.sendBeacon(c.url, blob);
          dbg("📡 sendBeacon: " + (ok ? "aceito" : "rejeitado"), ok ? "ok" : "warn");
          if (ok) respJson = { ok: true, _sendBeacon: true };
        } catch(e) { dbg("❌ sendBeacon: " + e.message, "err"); }
      }
    }
    adicionarHist(dados);
    dbg("📢 Chegou no toast | respJson=" + (respJson ? "sim" : "nenhum"), "ok");
    let msg = "✅ Lançado no Sheets!";
    if (respJson && !respJson._sendBeacon && !respJson._semJson) {
      dbg("✅ Resposta: " + JSON.stringify(respJson).substring(0,120), "ok");
      if (respJson.saldo !== undefined)
        msg += "\n💰 Saldo: R$" + Number(respJson.saldo).toLocaleString("pt-BR",{minimumFractionDigits:2});
      if (respJson.linkRecibo) {
        dbg("✅ Drive: " + respJson.linkRecibo, "ok");
        msg += "\n📎 Recibo no Drive";
        setTimeout(()=>{if(confirm("📎 Recibo salvo no Drive. Abrir?"))window.open(respJson.linkRecibo,"_blank");},800);
      }
    }
    toast(msg, "ok", 5000);
    if (pfx === "foto") resetarFoto(); else resetarManual();
  } catch(err) {
    dbg("❌ Erro fatal: " + err.message, "err");
    toast("❌ Erro ao enviar: " + err.message, "err");
  } finally {
    btn.classList.remove("sending");
    btn.innerHTML = txtOrig;
  }
}

async function lancarMulti() {
  dbg("🚀 Iniciando lançamento múltiplo...", "info");
  const c = cfg();
  if (!c.url) { toast("⚙️ Configure a URL do Apps Script","err"); abrirSettings(); return; }
  const semValor = _itensMulti.filter(it => !(parseFloat(it.valor) > 0));
  if (semValor.length > 0) { toast("⚠️ Todos os itens precisam ter valor","err"); return; }
  const btn = document.getElementById("confirmMultiBtn");
  btn.disabled = true;
  btn.textContent = "⏳ Enviando 0/" + _itensMulti.length + "...";
  const grupoId = (_metaMulti.fornecedor||"rec").replace(/\s+/g,"").substring(0,6).toUpperCase()
    + "_" + Date.now().toString(36).toUpperCase();
  let sucessos = 0, erros = 0, ultimoSaldo = null;
  for (let i = 0; i < _itensMulti.length; i++) {
    const it = _itensMulti[i];
    btn.textContent = "⏳ Enviando " + (i+1) + "/" + _itensMulti.length + "...";
    const dados = {
      tipo: it.tipo||"Saida", projeto: _metaMulti.projeto,
      valor: String(parseFloat(it.valor)||0), qtd: it.quantidade||"",
      descricao: it.descricao||"", fornecedor: it.fornecedor||_metaMulti.fornecedor||"N/A",
      categoria: it.categoria||"Administração", subCategoria: it.subCategoria||"",
      data: _metaMulti.data||new Date().toLocaleDateString("pt-BR"), grupoRecibo: grupoId,
    };
    try {
      let respJson = null;
      try {
        respJson = await _enviarGET(c.url, dados);
        if (respJson?.saldo !== undefined) ultimoSaldo = respJson.saldo;
        dbg("✅ Item " + (i+1) + " ok", "ok");
      } catch(getErr) {
        dbg("⚠️ Item " + i + " GET falhou: " + getErr.message, "warn");
        try {
          respJson = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open("POST", c.url, true);
            xhr.setRequestHeader("Content-Type","application/json");
            xhr.timeout = 30000;
            xhr.onload = () => {
              const txt = xhr.responseText||"";const s = txt.indexOf("{");
              if (s !== -1) { try { resolve(JSON.parse(txt.substring(s))); return; } catch(e) {} }
              if (xhr.status >= 200 && xhr.status < 400) { resolve({ ok:true }); return; }
              reject(new Error("POST " + xhr.status));
            };
            xhr.onerror = () => reject(new Error("XHR error"));
            xhr.ontimeout = () => reject(new Error("XHR timeout"));
            xhr.send(JSON.stringify(dados));
          });
          if (respJson?.saldo !== undefined) ultimoSaldo = respJson.saldo;
        } catch(postErr) { dbg("⚠️ Item " + i + " POST falhou: " + postErr.message, "warn"); }
      }
      if (i === 0 && imgB64 && imgMime)
        await _enviarFotoPost(c.url, { ...dados, fotoBase64: imgB64, fotoMime: imgMime });
      adicionarHist(dados);
      sucessos++;
    } catch(err) { erros++; dbg("❌ Erro item " + i + ": " + err.message, "err"); }
    if (i < _itensMulti.length - 1) await new Promise(r => setTimeout(r, 500));
  }
  btn.disabled = false;
  let msg = "✅ " + sucessos + " ite" + (sucessos===1?"m":"ns") + " lançado" + (sucessos===1?"":"s") + "!";
  if (ultimoSaldo !== null) msg += "\n💰 Saldo: " + fmtBRL(ultimoSaldo);
  if (erros > 0) msg += "\n⚠️ " + erros + " erro(s)";
  toast(msg, "ok", 5000);
  resetarFoto();
}

function preencherMulti(parsed,modeloUsado){
  const c=cfg();
  _metaMulti={fornecedor:parsed.fornecedor||"",valorTotal:parseFloat(parsed.valorTotal)||0,data:parsed.data||new Date().toLocaleDateString("pt-BR"),projeto:c.projeto};
  _itensMulti=(parsed.itens||[]).map(it=>({descricao:it.descricao||"",quantidade:it.quantidade||"1",valor:it.valor||"0.00",categoria:it.categoria||"Administração",subCategoria:it.subCategoria||"",tipo:it.tipo||"Saida",fornecedor:parsed.fornecedor||""}));
  document.getElementById("single-item-view").style.display="none";
  document.getElementById("multi-item-view").style.display="";
  document.getElementById("confirmBtn").style.display="none";
  document.getElementById("confirmMultiBtn").style.display="";

  document.getElementById("resultCard").classList.add("visible");

function renderItens(){
  const list=document.getElementById("itens-list");if(!list)return;
  const totalReal=_itensMulti.reduce((s,it)=>s+(parseFloat(it.valor)||0),0);
  const totalNota=_metaMulti.valorTotal||0;
  document.getElementById("itens-count-label").textContent=_itensMulti.length+" ite"+(_itensMulti.length===1?"m":"ns");
  document.getElementById("itens-total-label").textContent="Total: "+fmtBRL(totalReal);
  const warn=document.getElementById("itens-warn");
  if(warn){const diff=Math.abs(totalReal-totalNota);if(totalNota>0&&diff>0.05){warn.textContent="⚠️ Soma dos itens ("+fmtBRL(totalReal)+") ≠ total do recibo ("+fmtBRL(totalNota)+")";warn.classList.add("visible");}else{warn.classList.remove("visible");}}
  const btn=document.getElementById("confirmMultiBtn");if(btn)btn.textContent="✅ Lançar "+_itensMulti.length+" ite"+(_itensMulti.length===1?"m":"ns")+" no Sheets";
  list.innerHTML=_itensMulti.map((it,i)=>{
    const catOpts=Object.keys(CATS).map(k=>`<option value="${k}" ${k===it.categoria?"selected":""}>${k}</option>`).join("");
    const subOpts=(CATS[it.categoria]||[]).map(s=>`<option value="${s}" ${s===it.subCategoria?"selected":""}>${s}</option>`).join("")||'<option value="">—</option>';
    return`<div class="item-card" id="item-card-${i}"><div class="item-card-header" onclick="toggleItemCard(${i})"><span class="item-num">Item ${i+1}</span><span style="flex:1;padding:0 10px;font-size:13px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.descricao||"—"}</span><span class="item-valor-badge ${it.tipo==="Entrada"?"entrada":""}">${fmtBRL(parseFloat(it.valor)||0)}</span><button class="item-remove" onclick="removerItem(event,${i})">×</button></div><div class="item-body" id="item-body-${i}"><div class="frow"><span class="flabel">Descrição</span><input class="fval" value="${escHtml(it.descricao)}" oninput="_itensMulti[${i}].descricao=this.value" placeholder="—"></div><div class="frow"><span class="flabel">Valor (R$)</span><input class="fval c-saida" value="${it.valor}" oninput="_itensMulti[${i}].valor=this.value;renderItens()" inputmode="decimal"></div><div class="frow"><span class="flabel">Quantidade</span><input class="fval" value="${escHtml(it.quantidade)}" oninput="_itensMulti[${i}].quantidade=this.value" inputmode="decimal" placeholder="1"></div><div class="frow"><span class="flabel">Categoria</span><select class="fval" onchange="_itensMulti[${i}].categoria=this.value;_itensMulti[${i}].subCategoria='';renderItens()">${catOpts}</select></div><div class="frow"><span class="flabel">Subcategoria</span><select class="fval" onchange="_itensMulti[${i}].subCategoria=this.value">${subOpts}</select></div></div></div>`;
  }).join("");
}
function toggleItemCard(i){const b=document.getElementById("item-body-"+i);if(b)b.style.display=b.style.display==="none"?"":"";}
function removerItem(e,i){e.stopPropagation();if(_itensMulti.length<=1){toast("⚠️ Pelo menos 1 item necessário","err");return;}_itensMulti.splice(i,1);renderItens();}
function adicionarItemVazio(){
  _itensMulti.push({descricao:"",quantidade:"1",valor:"0.00",categoria:"Administração",subCategoria:"",tipo:"Saida",fornecedor:_metaMulti.fornecedor||""});
  renderItens();
  setTimeout(()=>{const cards=document.querySelectorAll(".item-card");cards[cards.length-1]?.scrollIntoView({behavior:"smooth",block:"nearest"});},100);
}
function fmtBRL(v){return"R$"+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

// ── HISTÓRICO ──────────────────────────────────────────────────
function adicionarHist(d){
  hist.unshift({...d,ts:Date.now()});if(hist.length>15)hist=hist.slice(0,15);
  try{localStorage.setItem("rc_hist",JSON.stringify(hist));}catch(e){}renderHist();
}
function renderHist(){
  const el=document.getElementById("histSection");
  if(!hist.length){el.innerHTML="";return;}
  el.innerHTML=`<div class="hist-title">Últimos lançamentos</div>`+
    hist.slice(0,6).map(h=>{
      const cls=h.tipo==="Entrada"?"e":"s";const sinal=h.tipo==="Entrada"?"+":"-";
      return`<div class="hist-item"><div class="hdot ${cls}"></div><div class="hinfo"><div class="hdesc">${h.descricao||h.subCategoria||h.categoria}</div><div class="hmeta">${h.projeto} · ${h.fornecedor||""} · ${new Date(h.ts).toLocaleDateString("pt-BR")}</div></div><div class="hval ${cls}">${sinal}R$${parseFloat(h.valor||0).toFixed(2).replace(".",",")}</div></div>`;
    }).join("");
}

// ── FORNECEDOR BOTTOM SHEET ────────────────────────────────────
async function carregarFornecedores(forcar){
  if(_fornecedores.length>0&&!forcar)return;if(_fornCarregando)return;_fornCarregando=true;
  const url=cfg().url;if(!url){_fornCarregando=false;return;}
  try{const r=await fetch(url+"?action=fornecedores");const d=await r.json();if(d.ok&&Array.isArray(d.fornecedores))_fornecedores=d.fornecedores;}
  catch(e){console.warn("Fornecedores:",e);}finally{_fornCarregando=false;}
}
async function abrirSheetFornecedor(pfx){
  _fornPfxAtivo=pfx;
  const ov=document.getElementById("forn-ov"),bs=document.getElementById("forn-bs"),inp=document.getElementById("forn-bs-input");
  ov.classList.add("open");bs.classList.add("open");inp.value="";
  document.getElementById("forn-bs-clr").classList.remove("vis");
  document.getElementById("forn-bs-list").innerHTML='<div class="forn-bs-empty">⏳ Carregando…</div>';
  await carregarFornecedores(false);renderSheetFornecedor();
  setTimeout(()=>inp.focus(),350);iniciarSwipeSheet();
}
function fecharSheetFornecedor(){
  const bs=document.getElementById("forn-bs"),ov=document.getElementById("forn-ov");
  bs.style.transition="transform .3s cubic-bezier(.32,.72,0,1)";bs.style.transform="translateY(100%)";
  ov.classList.remove("open");setTimeout(()=>{bs.classList.remove("open");bs.style.transform="";},300);
}
function renderSheetFornecedor(){
  const inp=document.getElementById("forn-bs-input"),list=document.getElementById("forn-bs-list"),clr=document.getElementById("forn-bs-clr");
  const q=inp.value.trim(),ql=q.toLowerCase();clr.classList.toggle("vis",q.length>0);
  const filtrado=ql?_fornecedores.filter(f=>f.toLowerCase().includes(ql)):_fornecedores;
  let html="";filtrado.forEach(f=>{const esc=f.replace(/'/g,"\\'");html+=`<div class="forn-bs-opt" onclick="selecionarSheetFornecedor('${esc}')">${f}</div>`;});
  const jaExiste=_fornecedores.some(f=>f.toLowerCase()===ql);
  if(q&&!jaExiste){const qEsc=q.replace(/'/g,"\\'");html+=`<div class="forn-bs-opt add-new" onclick="adicionarNovoFornecedor('${qEsc}')">Adicionar "${q}"</div>`;}
  list.innerHTML=html||'<div class="forn-bs-empty">Nenhum resultado</div>';
}
function selecionarSheetFornecedor(val){
  if(!_fornPfxAtivo)return;
  const input=document.getElementById("forn-"+_fornPfxAtivo),wrap=document.getElementById("forn-wrap-"+_fornPfxAtivo);
  if(input){input.value=val;wrap?.classList.add("has-value");}fecharSheetFornecedor();
}
function limparFornecedor(pfx){
  const input=document.getElementById("forn-"+pfx),wrap=document.getElementById("forn-wrap-"+pfx),badge=document.getElementById("forn-badge-"+pfx);
  if(input)input.value="";wrap?.classList.remove("has-value");if(badge)badge.style.display="none";
}
async function adicionarNovoFornecedor(nome){
  const nomeReal=nome.trim();if(!nomeReal)return;const url=cfg().url;if(!url){toast("⚙️ Configure a URL primeiro","err");return;}
  try{
    const resp=await fetch(url+"?action=addFornecedor&nome="+encodeURIComponent(nomeReal));
    const data=await resp.json();
    if(data.ok){_fornecedores.push(nomeReal);_fornecedores.sort((a,b)=>a.localeCompare(b,"pt-BR"));selecionarSheetFornecedor(nomeReal);toast("✅ Fornecedor adicionado!","ok");}
    else{toast("❌ "+(data.erro||"Erro ao adicionar"),"err");}
  }catch(e){toast("❌ Erro de rede","err");}
}
function iniciarSwipeSheet(){
  const bs=document.getElementById("forn-bs"),drag=document.getElementById("forn-bs-drag");
  let startY=0,startT=0,dragging=false;
  drag.ontouchstart=e=>{startY=e.touches[0].clientY;startT=Date.now();dragging=true;bs.style.transition="none";};
  drag.ontouchmove=e=>{if(!dragging)return;bs.style.transform=`translateY(${Math.max(0,e.touches[0].clientY-startY)}px)`;};
  drag.ontouchend=e=>{if(!dragging)return;dragging=false;const dy=e.changedTouches[0].clientY-startY,dt=Date.now()-startT;if(dy>100||(dy>40&&dt<250))fecharSheetFornecedor();else{bs.style.transition="transform .3s cubic-bezier(.32,.72,0,1)";bs.style.transform="translateY(0)";}};
}
function abrirFornecedores(pfx){abrirSheetFornecedor(pfx);}
function fecharFornecedorDD(pfx){fecharSheetFornecedor();}
function filtrarFornecedores(pfx){renderSheetFornecedor();}

// ── TOAST ──────────────────────────────────────────────────────
let _toastT;
function toast(msg,tipo="",duracao=0){
  const el=document.getElementById("toast");el.style.whiteSpace="pre-line";el.textContent=msg;
  el.className="toast show"+(tipo?" "+tipo:"");clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.remove("show"),duracao||(tipo==="err"?5000:3000));
}

buildFields("fields-foto","foto","Saida","setTipoFoto");
buildFields("fields-manual","manual","Saida","setTipoManual");
renderHist();
setTimeout(()=>carregarFornecedores(false),1500);
const _c=cfg();
if(!_c.key||!_c.url){setTimeout(()=>toast("⚙️ Configure a chave e URL nas configurações",""),900);}

  <div style="color:#fff;font-size:16px;font-weight:600;">✨ IA analisando...</div>
  <div class="dbg-log" style="color:#aef;font-size:11px;margin-top:4px;white-space:pre-wrap;max-width:300px;text-align:center;max-height:120px;overflow:auto;"></div>
  <button onclick="forcarSaida()" style="margin-top:8px;padding:8px 20px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:20px;font-size:13px;cursor:pointer;">Cancelar e preencher manual</button>
</div>

<!-- FORNECEDOR BOTTOM SHEET -->
<div class="forn-ov" id="forn-ov" onclick="fecharSheetFornecedor()"></div>
<div class="forn-bs" id="forn-bs">
  <div class="forn-bs-top" id="forn-bs-drag">
    <div class="forn-bs-handle"></div>
    <div class="forn-bs-header">
      <span class="forn-bs-title">Fornecedor</span>
      <button class="forn-bs-close" onclick="fecharSheetFornecedor()">✕</button>
    </div>
    <div class="forn-bs-search">
      <input type="text" id="forn-bs-input" placeholder="Buscar fornecedor…" autocomplete="off" spellcheck="false" oninput="renderSheetFornecedor()">
      <button class="forn-bs-search-clear" id="forn-bs-clr" onclick="document.getElementById('forn-bs-input').value='';renderSheetFornecedor();this.classList.remove('vis')">✕</button>
    </div>
  </div>
  <div class="forn-bs-list" id="forn-bs-list"></div>
</div>

<!-- DEBUG PANEL -->
<div id="debugPanel">
  <div id="debugHeader">
    <span>🔍 Log de Debug</span>
    <div style="display:flex;gap:8px">
      <button onclick="document.getElementById('debugLog').innerHTML=''" title="Limpar">🗑️</button>
      <button onclick="document.getElementById('debugPanel').classList.remove('open')">✕</button>
    </div>
  </div>
  <div id="debugLog"></div>
</div>

</body>
</html>
