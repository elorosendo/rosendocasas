<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Recibos - Casas Rosendo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: system-ui;
background:#0f172a;
color:white;
padding:20px;
max-width:600px;
margin:auto;
}

h1{
font-size:22px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:14px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

img{
width:100%;
margin-top:15px;
border-radius:8px;
}

.status{
margin-top:10px;
font-size:13px;
opacity:0.8;
}

</style>
</head>

<body>

<h1>📄 Recibos Casas Rosendo</h1>

<div class="card">

<label>API Key Gemini</label>
<input id="apikey" placeholder="cole sua API key">

<button onclick="salvarKey()">Salvar API Key</button>

</div>

<div class="card">

<label>Foto do recibo</label>

<input type="file" id="file" accept="image/*" capture="environment">

<img id="preview">

<button onclick="lerRecibo()">📸 Ler recibo</button>

<div class="status" id="status"></div>

</div>

<div class="card">

<label>Empresa</label>
<input id="empresa">

<label>Data</label>
<input id="data">

<label>Valor</label>
<input id="valor">

<label>Categoria</label>
<select id="categoria">
<option>Material</option>
<option>Ferramentas</option>
<option>Elétrica</option>
<option>Hidráulica</option>
<option>Mão de obra</option>
<option>Transporte</option>
<option>Alimentação</option>
<option>Outros</option>
</select>

<label>Descrição</label>
<input id="descricao">

<button onclick="enviar()">Enviar para planilha</button>

</div>

<script>

const MODELOS = [
"gemini-2.5-flash",
"gemini-2.0-flash"
]

function salvarKey(){

const key = document.getElementById("apikey").value
localStorage.setItem("rc_key",key)

alert("API key salva")

}

document.getElementById("apikey").value =
localStorage.getItem("rc_key") || ""

document.getElementById("file").onchange = e=>{

const file = e.target.files[0]

const reader = new FileReader()

reader.onload = ()=>{

document.getElementById("preview").src = reader.result

}

reader.readAsDataURL(file)

}

async function lerRecibo(){

const file = document.getElementById("file").files[0]

if(!file){
alert("Escolha uma imagem")
return
}

const status = document.getElementById("status")
status.innerText="Lendo recibo..."

const reader = new FileReader()

reader.onload = async ()=>{

const base64 = reader.result.split(",")[1]
const mime = file.type

await processarRecibo(base64,mime)

}

reader.readAsDataURL(file)

}

async function processarRecibo(imgB64,imgMime){

const API_KEY = localStorage.getItem("rc_key")

const prompt = `
Extraia as informações do recibo.

Retorne apenas JSON:

{
"empresa":"",
"data":"",
"valor":"",
"categoria":"",
"descricao":""
}
`

for(const modelo of MODELOS){

try{

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({

contents:[{
parts:[
{ text:prompt },
{
inlineData:{
mimeType:imgMime,
data:imgB64
}
}
]
}],

generationConfig:{
temperature:0.1,
maxOutputTokens:500
}

})
})

if(!res.ok) continue

const data = await res.json()

let text =
data?.candidates?.[0]?.content?.parts?.[0]?.text

if(!text) continue

text=text
.replace(/```json/g,"")
.replace(/```/g,"")
.trim()

const json = JSON.parse(text)

preencher(json)

document.getElementById("status").innerText="Recibo lido ✔"

return

}catch(e){

console.log(e)

}

}

document.getElementById("status").innerText="Erro ao ler recibo"

}

function preencher(data){

document.getElementById("empresa").value = data.empresa || ""
document.getElementById("data").value = data.data || ""
document.getElementById("valor").value = data.valor || ""
document.getElementById("categoria").value = data.categoria || "Outros"
document.getElementById("descricao").value = data.descricao || ""

}

function enviar(){

alert("Aqui você conecta ao Google Sheets")

}

</script>

</body>
</html>
