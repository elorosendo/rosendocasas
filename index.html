<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recibos">
<title>Recibos — Rosendo Casas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── RESET & VARS ─── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:        #0F1117;
    --surface:   #1A1D27;
    --surface2:  #222636;
    --border:    rgba(255,255,255,0.08);
    --green:     #22C55E;
    --green-dim: rgba(34,197,94,0.15);
    --red:       #EF4444;
    --red-dim:   rgba(239,68,68,0.12);
    --gold:      #F59E0B;
    --text:      #F1F5F9;
    --muted:     #64748B;
    --muted2:    #94A3B8;
    --radius:    16px;
    --font:      'Space Grotesk', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LAYOUT ─── */
  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
  }

  /* ─── HEADER ─── */
  header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--green);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  .settings-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.15s;
  }
  .settings-btn:active { background: var(--surface2); }

  /* ─── MAIN CONTENT ─── */
  main {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── CAMERA ZONE ─── */
  .camera-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .camera-zone.has-image {
    border-style: solid;
    border-color: var(--green);
    background: var(--surface2);
  }

  .camera-zone.dragging {
    border-color: var(--gold);
    background: rgba(245,158,11,0.05);
  }

  .camera-zone:active { background: var(--surface2); }

  #preview-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: calc(var(--radius) - 2px);
    display: none;
  }

  .camera-zone.has-image #preview-img { display: block; }
  .camera-zone.has-image .camera-placeholder { display: none; }

  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }

  .camera-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .camera-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .camera-sub {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    padding: 0 24px;
  }

  #file-input {
    display: none;
  }

  /* ─── CHANGE PHOTO BTN ─── */
  .change-photo-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: none;
  }

  .camera-zone.has-image .change-photo-btn { display: block; }

  /* ─── ANALYZE BUTTON ─── */
  .analyze-btn {
    width: 100%;
    height: 56px;
    background: var(--green);
    color: #0a1a0f;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .analyze-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .analyze-btn:not(:disabled):active {
    transform: scale(0.98);
    opacity: 0.9;
  }

  .analyze-btn .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(10,26,15,0.3);
    border-top-color: #0a1a0f;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .analyze-btn.loading .btn-text { display: none; }
  .analyze-btn.loading .spinner  { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── RESULT CARD ─── */
  .result-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  .result-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .edit-hint {
    font-size: 11px;
    color: var(--muted);
  }

  /* ─── FIELDS ─── */
  .fields {
    padding: 4px 0;
  }

  .field-row {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .field-row:last-child { border-bottom: none; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    width: 90px;
    flex-shrink: 0;
  }

  .field-value {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .field-value:focus {
    background: var(--surface2);
  }

  select.field-value {
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .field-value.valor-entrada { color: var(--green); }
  .field-value.valor-saida   { color: var(--red); }

  /* Tipo badge */
  .tipo-select-wrap {
    flex: 1;
    display: flex;
    gap: 8px;
  }

  .tipo-btn {
    flex: 1;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tipo-btn.active-saida  { background: var(--red-dim);   border-color: var(--red);   color: var(--red); }
  .tipo-btn.active-entrada{ background: var(--green-dim); border-color: var(--green); color: var(--green); }

  /* ─── CONFIRM BUTTON ─── */
  .confirm-btn {
    width: 100%;
    height: 56px;
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }

  .confirm-btn.visible { display: flex; }
  .confirm-btn:not(:disabled):active { transform: scale(0.98); }

  .confirm-btn.loading-confirm {
    opacity: 0.6;
    pointer-events: none;
  }

  /* ─── STATUS TOAST ─── */
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error   { border-color: var(--red); }

  /* ─── SETTINGS PANEL ─── */
  .settings-panel {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
  }

  .settings-panel.open { display: flex; }

  .settings-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }

  .settings-sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px calc(24px + env(safe-area-inset-bottom, 0));
    animation: sheetUp 0.3s ease;
    max-width: 480px;
    margin: 0 auto;
  }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .settings-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .settings-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .settings-field {
    margin-bottom: 16px;
  }

  .settings-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    display: block;
  }

  .settings-input {
    width: 100%;
    height: 48px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 0 16px;
    outline: none;
    transition: border-color 0.15s;
  }

  .settings-input:focus { border-color: var(--green); }

  .save-settings-btn {
    width: 100%;
    height: 48px;
    background: var(--green);
    border: none;
    border-radius: 12px;
    color: #0a1a0f;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }

  /* ─── HISTORY ─── */
  .history {
    margin-top: 4px;
  }

  .history-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .history-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .history-dot.saida   { background: var(--red); }
  .history-dot.entrada { background: var(--green); }

  .history-info { flex: 1; min-width: 0; }

  .history-desc {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .history-valor {
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .history-valor.saida   { color: var(--red); }
  .history-valor.entrada { color: var(--green); }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🧾</div>
      <div>
        <div class="logo-text">Recibos</div>
        <div class="logo-sub">Rosendo Casas</div>
      </div>
    </div>
    <div class="settings-btn" onclick="abrirSettings()">⚙️</div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- CAMERA ZONE -->
    <div class="camera-zone" id="cameraZone" onclick="triggerCamera()">
      <img id="preview-img" alt="preview">
      <div class="camera-placeholder">
        <div class="camera-icon">📷</div>
        <div class="camera-title">Fotografar recibo</div>
        <div class="camera-sub">Toque para abrir a câmera ou selecionar uma imagem da galeria</div>
      </div>
      <button class="change-photo-btn" onclick="event.stopPropagation(); triggerCamera()">
        Trocar foto
      </button>
    </div>

    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="onFileSelected(event)">

    <!-- ANALYZE BUTTON -->
    <button class="analyze-btn" id="analyzeBtn" disabled onclick="analisarRecibo()">
      <span class="btn-text">✨ Analisar com IA</span>
      <div class="spinner"></div>
    </button>

    <!-- RESULT CARD -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div class="result-header-left">
          <div class="result-dot"></div>
          <span class="result-title">Dados extraídos</span>
        </div>
        <span class="edit-hint">toque para editar</span>
      </div>
      <div class="fields">

        <div class="field-row">
          <span class="field-label">Tipo</span>
          <div class="tipo-select-wrap">
            <button class="tipo-btn active-saida" id="btnSaida" onclick="setTipo('Saida')">↓ Saída</button>
            <button class="tipo-btn" id="btnEntrada" onclick="setTipo('Entrada')">↑ Entrada</button>
          </div>
        </div>

        <div class="field-row">
          <span class="field-label">Projeto</span>
          <select class="field-value" id="fieldProjeto">
            <option>P3</option>
            <option>P4</option>
            <option>P5</option>
            <option>Outro</option>
          </select>
        </div>

        <div class="field-row">
          <span class="field-label">Valor</span>
          <input class="field-value valor-saida" id="fieldValor" type="text" placeholder="0,00">
        </div>

        <div class="field-row">
          <span class="field-label">Descrição</span>
          <input class="field-value" id="fieldDesc" type="text" placeholder="—">
        </div>

        <div class="field-row">
          <span class="field-label">Fornecedor</span>
          <input class="field-value" id="fieldFornecedor" type="text" placeholder="—">
        </div>

        <div class="field-row">
          <span class="field-label">Categoria</span>
          <select class="field-value" id="fieldCategoria" onchange="atualizarSubcats()">
            <option>Terreno e Legalização</option>
            <option>Infraestrutura e Fundação</option>
            <option>Estrutura e Alvenaria</option>
            <option>Instalação Elétrica</option>
            <option>Instalação Hidraulica</option>
            <option>Cobertura</option>
            <option>Esquadrias</option>
            <option>Acabamentos</option>
            <option>Mão de Obra</option>
            <option>Logistica e Apoio</option>
            <option>Administração</option>
          </select>
        </div>

        <div class="field-row">
          <span class="field-label">Subcategoria</span>
          <input class="field-value" id="fieldSubcat" type="text" placeholder="—">
        </div>

      </div>
    </div>

    <!-- CONFIRM BUTTON -->
    <button class="confirm-btn" id="confirmBtn" onclick="confirmarLancamento()">
      <span>✅ Lançar no Sheets</span>
    </button>

    <!-- HISTORY -->
    <div class="history" id="history"></div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-backdrop" onclick="fecharSettings()"></div>
  <div class="settings-sheet">
    <div class="settings-handle"></div>
    <div class="settings-title">⚙️ Configurações</div>

    <div class="settings-field">
      <label class="settings-label">Chave API Gemini</label>
      <input class="settings-input" id="inputGeminiKey" type="password" placeholder="AIza...">
    </div>

    <div class="settings-field">
      <label class="settings-label">URL do Apps Script (Deploy)</label>
      <input class="settings-input" id="inputScriptUrl" type="text" placeholder="https://script.google.com/macros/s/...">
    </div>

    <div class="settings-field">
      <label class="settings-label">Projeto padrão</label>
      <input class="settings-input" id="inputProjeto" type="text" placeholder="P3">
    </div>

    <button class="save-settings-btn" onclick="salvarSettings()">Salvar</button>
  </div>
</div>

<script>
// ─── ESTADO ───
let imagemBase64 = null;
let imagemMime   = null;
let tipoAtual    = "Saida";
let historico    = JSON.parse(localStorage.getItem("historico") || "[]");

// ─── CONFIG (salva no localStorage) ───
function getConfig() {
  return {
    geminiKey: localStorage.getItem("geminiKey") || "",
    scriptUrl: localStorage.getItem("scriptUrl") || "",
    projeto:   localStorage.getItem("projeto")   || "P3",
  };
}

function salvarSettings() {
  localStorage.setItem("geminiKey", document.getElementById("inputGeminiKey").value.trim());
  localStorage.setItem("scriptUrl", document.getElementById("inputScriptUrl").value.trim());
  localStorage.setItem("projeto",   document.getElementById("inputProjeto").value.trim() || "P3");
  fecharSettings();
  toast("✅ Configurações salvas!", "success");
}

function abrirSettings() {
  const c = getConfig();
  document.getElementById("inputGeminiKey").value = c.geminiKey;
  document.getElementById("inputScriptUrl").value = c.scriptUrl;
  document.getElementById("inputProjeto").value   = c.projeto;
  document.getElementById("settingsPanel").classList.add("open");
}

function fecharSettings() {
  document.getElementById("settingsPanel").classList.remove("open");
}

// ─── CÂMERA / FILE ───
function triggerCamera() {
  document.getElementById("file-input").click();
}

function onFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;

  imagemMime = file.type;

  const reader = new FileReader();
  reader.onload = (e) => {
    const result = e.target.result;
    imagemBase64 = result.split(",")[1]; // só o base64

    // Mostrar preview
    const preview = document.getElementById("preview-img");
    preview.src = result;
    document.getElementById("cameraZone").classList.add("has-image");
    document.getElementById("analyzeBtn").disabled = false;

    // Resetar resultado anterior
    document.getElementById("resultCard").classList.remove("visible");
    document.getElementById("confirmBtn").classList.remove("visible");
  };
  reader.readAsDataURL(file);

  // Limpar input para permitir mesma foto
  event.target.value = "";
}

// ─── TIPO ───
function setTipo(tipo) {
  tipoAtual = tipo;
  document.getElementById("btnSaida").className    = "tipo-btn" + (tipo === "Saida"   ? " active-saida"   : "");
  document.getElementById("btnEntrada").className  = "tipo-btn" + (tipo === "Entrada" ? " active-entrada" : "");
  const valorEl = document.getElementById("fieldValor");
  valorEl.className = "field-value " + (tipo === "Saida" ? "valor-saida" : "valor-entrada");
}

// ─── ANALISAR COM GEMINI ───
async function analisarRecibo() {
  const config = getConfig();

  if (!config.geminiKey) {
    toast("⚙️ Configure a chave Gemini primeiro", "error");
    abrirSettings();
    return;
  }

  if (!imagemBase64) {
    toast("📷 Tire uma foto primeiro", "error");
    return;
  }

  const btn = document.getElementById("analyzeBtn");
  btn.disabled = true;
  btn.classList.add("loading");

  try {
    const prompt = `Analise este recibo ou comprovante de pagamento e extraia as informações.

Responda APENAS com JSON válido, sem texto extra, neste formato:
{

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${config.geminiKey}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: imagemMime, data: imagemBase64 } }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 400 }
        })
      }
    );

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const texto  = data.candidates[0].content.parts[0].text;
    const limpo  = texto.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
    const parsed = JSON.parse(limpo);

    // Preencher campos
    preencherCampos(parsed);

    document.getElementById("resultCard").classList.add("visible");
    document.getElementById("confirmBtn").classList.add("visible");

    toast("✨ Recibo analisado!", "success");

  } catch(err) {
    console.error(err);
    toast("❌ Erro ao analisar: " + err.message, "error");
    // Mesmo com erro, mostra os campos para preenchimento manual
    preencherCampos({});
    document.getElementById("resultCard").classList.add("visible");
    document.getElementById("confirmBtn").classList.add("visible");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
}

function preencherCampos(dados) {
  const config = getConfig();

  if (dados.tipo) setTipo(dados.tipo);

  document.getElementById("fieldProjeto").value    = config.projeto;
  document.getElementById("fieldValor").value      = dados.valor      || "";
  document.getElementById("fieldDesc").value       = dados.descricao  || "";
  document.getElementById("fieldFornecedor").value = dados.fornecedor || "";
  document.getElementById("fieldSubcat").value     = dados.subCategoria || "";

  if (dados.categoria) {
    const sel = document.getElementById("fieldCategoria");
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === dados.categoria) {
        sel.selectedIndex = i;
        break;
      }
    }
  }
}

// ─── CONFIRMAR E LANÇAR NO SHEETS ───
async function confirmarLancamento() {
  const config = getConfig();

  if (!config.scriptUrl) {
    toast("⚙️ Configure a URL do Apps Script primeiro", "error");
    abrirSettings();
    return;
  }

  const btn = document.getElementById("confirmBtn");
  btn.classList.add("loading-confirm");
  btn.innerHTML = '<span>Enviando...</span>';

  const dados = {
    tipo:         tipoAtual,
    projeto:      document.getElementById("fieldProjeto").value,
    valor:        document.getElementById("fieldValor").value.replace(",", "."),
    descricao:    document.getElementById("fieldDesc").value,
    fornecedor:   document.getElementById("fieldFornecedor").value,
    categoria:    document.getElementById("fieldCategoria").value,
    subCategoria: document.getElementById("fieldSubcat").value,
    data:         new Date().toLocaleDateString("pt-BR"),
  };

  try {
    const resp = await fetch(config.scriptUrl, {
      method: "POST",
      mode:   "no-cors", // Apps Script não retorna CORS, mas o POST é executado
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(dados),
    });

    // Com no-cors não conseguimos ler a resposta, mas o Apps Script executa
    // Assumir sucesso e salvar no histórico local
    adicionarHistorico(dados);
    toast("✅ Lançado no Sheets!", "success");
    resetarApp();

  } catch(err) {
    toast("❌ Erro ao enviar: " + err.message, "error");
  } finally {
    btn.classList.remove("loading-confirm");
    btn.innerHTML = '<span>✅ Lançar no Sheets</span>';
  }
}

// ─── SUBCATEGORIAS POR CATEGORIA ───
const SUBCATS = {

  "Infraestrutura e Fundação":["Aterro","Terra","Areia","Pedra","Cimento","Ferro","Arame","Lajes","Concreto"],
  "Estrutura e Alvenaria":    ["Blocos vedacao","Muro","Colunas e vigas","Reparo estrutural","Concreto"],
  "Instalação Elétrica":      ["Fio","Conduite","Caixa disjuntor","Luz","Poste","Dijuntores","Interruptores","Tomadas","Soquetes"],
  "Instalação Hidraulica":    ["Tubos e conexoes","Caixa esgoto","Torneira","Vaso sanitario","Concreto","Registros","Caixa dágua"],
  "Cobertura":                ["Telhado","Madeiramento","Calha"],
  "Esquadrias":               ["Portas","Janelas","Portoes"],
  "Acabamentos":              ["Piso","Azulejo","Gesso","Tinta","Marmore","Grama"],
  "Mão de Obra":              ["Mao de obra geral","Empreitagem","Diarias","Muro","Pintura","Gesseiro"],
  "Logistica e Apoio":        ["Gasolina","Frete","Locacoes","Limpeza final"],
  "Administração":            ["Materiais diversos","Despesas administrativas","Livro engenheiro","Outros","Ferramentas","Contas obra","Deposito fornecedor","Venda de propriedade","Corretor","Taxas","Imposto"],
};

function atualizarSubcats() {
  const cat   = document.getElementById("fieldCategoria").value;
  const subs  = SUBCATS[cat] || [];
  const subEl = document.getElementById("fieldSubcat");
  // Se for input de texto, apenas sugere a primeira subcategoria
  if (subEl.tagName === "INPUT") {
    if (!subEl.value || subs.includes(subEl.value)) {
      subEl.value = subs[0] || "";
    }
  }
}


function resetarApp() {
  imagemBase64 = null;
  imagemMime   = null;
  document.getElementById("preview-img").src = "";
  document.getElementById("cameraZone").classList.remove("has-image");
  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("resultCard").classList.remove("visible");
  document.getElementById("confirmBtn").classList.remove("visible");
  document.getElementById("file-input").value = "";
}

// ─── HISTÓRICO LOCAL ───
function adicionarHistorico(dados) {
  historico.unshift({ ...dados, ts: Date.now() });
  if (historico.length > 10) historico = historico.slice(0, 10);
  localStorage.setItem("historico", JSON.stringify(historico));
  renderHistorico();
}

function renderHistorico() {
  const el = document.getElementById("history");
  if (historico.length === 0) { el.innerHTML = ""; return; }

  el.innerHTML = `<div class="history-title">Últimos lançamentos</div>` +
    historico.slice(0, 5).map(h => `
      <div class="history-item">
        <div class="history-dot ${h.tipo === 'Entrada' ? 'entrada' : 'saida'}"></div>
        <div class="history-info">
          <div class="history-desc">${h.descricao || h.categoria}</div>
          <div class="history-meta">${h.projeto} · ${h.fornecedor || ''} · ${new Date(h.ts).toLocaleDateString('pt-BR')}</div>
        </div>
        <div class="history-valor ${h.tipo === 'Entrada' ? 'entrada' : 'saida'}">
          ${h.tipo === 'Entrada' ? '+' : '-'}R$${parseFloat(h.valor||0).toFixed(2).replace('.',',')}
        </div>
      </div>
    `).join("");
}

// ─── TOAST ───
let toastTimeout;
function toast(msg, tipo = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = "toast show " + tipo;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { el.classList.remove("show"); }, 3000);
}

// ─── INIT ───
renderHistorico();

// Verificar se tem config salva
const cfg = getConfig();
if (!cfg.geminiKey || !cfg.scriptUrl) {
  setTimeout(() => toast("⚙️ Configure as chaves nas configurações", ""), 800);
}
